    <script>
        const entries = document.querySelectorAll('.entry');

        const observer = new IntersectionObserver((entrieslist)=>{
            entrieslist.forEach(entry =>{
                if(entry.isIntersecting){
                    entry.target.classlist.add('visible');
                }
            });
        }, {threshold: 0.3});

        entries.forEach(entry => {
            observer.observe(entry);
            
        });
    </script>

    <script>
        const form = document.getElementById('journal-form');
        const titleInput = document.getElementById('entry-title');
        const contentInput = document.getElementById('entry-content');
        const container = document.getElementById('entries-container');

        form.addEventListener('submit',function(e){
            e.preventDefault();
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();

            if(title && content){
                const entry = document.createElement('div');
                entry.classList.add('entry');
                entry.innerHTML=  `
                                <h3>${title}</h3>
                                <p>${content}</p>
                                <p><strong>Mood:</strong> ${entry.mood}</p>
                            <small class="timestamp">${timestamp}</small>
                            <div class="entry-actions">
                                <button class="edit-btn">Edit</button>
                                <button class="delete-btn">Delete</button>
                            </div>
                            `;
;const mood = document.getElementById("mood").value;
// ...
entries.unshift({ title, content, date, mood });

                container.prepend(entry);

                //save to storage
                saveEntry({title,content,timestamp});

                //reset form
                form.reset();
            }
            
        });


        //save and load from local storage

        function saveEntry(entry){
            const entries = JSON.parse(localStorage.getItem('journalEntries')|| '[]');
            entries.forEach(({title,content}) => {
                const entry = document.createElement('div');
                entry.classlist.add('entry');
              const timestamp = new Date().toLocaleString();
              entry.innerHTML = `
              <h3>${title}</h3>
              <p>${content}</p>
              <small class="timestamp">${timestamp}</small>
              <div class ="entry-actions">
                <button class="edit-btn">Edit</button>
                <button class ="delete-btn" >Delete</button>
                </div>
                     `;
                container.appendChild(entry);
            });
        }

        loadEntries();

        container.addEventListener('click',(e)=>{
            if(e.target.classList.contains('delete-btn')){
                const entryDiv = e.target.closest('.entry');
                const index = Array.from(container.children).indexOf(entryDiv);

                entryDiv.remove();
                deleteEntry(index);
            }

            if(e.target.classList.contains('edit-btn')){
                const entryDiv  = e.target.closest('.entry');
                const index = Array.from(container.children).indexOf(entryDiv);

                const title = entryDiv.querySelector('h3').textContent;
                const content = entryDiv.querySelector('p').textContent;

                const newTitle = prompt('edit title:', title);
                const newContent = prompt('Edit content:', content);

                if(newTitle !== null && newContent !== null){
                    entryDiv.querySelector('h3').textContent = newTitle;
                    entryDiv.querySelector('p').textContent = newContent;
                    

                    updateEntry(index,newTitle,newContent);
                }
            }
        });


        function deleteEntry(index){
            const entries = JSON.parse(localStorage.getItem('journalEntries')|| '[]');
            entires.splice(index,1);
            localStorage.setItem('journalEntries',JSON.stringify(entries));
        }

        function updateEntry(index,title,content){

            const entries = JSON.parse(localStorage.getItem('journalEntries')|| '[]');
            entries[index].title=title;
            entries[index].content=content;
            localStorage.setItem('journalEntires',JSON.stringify(entries));
        }
        
    </script>
